apply plugin: 'com.android.application'

android {
    namespace 'eu.veldsoft.vitosha.poker.odds'
    compileSdk 33

    defaultConfig {
        applicationId "eu.veldsoft.vitosha.poker.odds"
        minSdk 25
        targetSdk 33
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.txt'
        }
    }

    lintOptions {
        abortOnError false
    }
}
